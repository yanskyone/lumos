<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>初中数学 · 知识地图</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<!-- 注意：amstext 扩展在 0.16.x 版本中已内置于核心库，无需单独引入 -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <header id="header">
    <button id="btn-back" class="icon-btn" aria-label="返回" style="visibility:hidden">←</button>
    <h1 id="header-title">知识地图</h1>
    <div class="header-actions">
      <button id="btn-home" class="icon-btn" aria-label="主页" title="返回主页" onclick="location.href='../index.html'">🏠</button>
      <button id="btn-search" class="icon-btn" aria-label="搜索">🔍</button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Tab: Map -->
    <section id="tab-map" class="tab-content active">
      <!-- Subject cards -->
      <div id="subject-grid" class="view">
        <div class="card subject-card" data-subject="数学" data-action="subject">
          <div class="subject-icon">📐</div>
          <div class="subject-info">
            <div class="subject-name">数学</div>
            <div class="subject-stats"><span id="math-mastered">0</span> / 99 已掌握</div>
            <div class="progress-bar"><div class="progress-fill" id="math-progress"></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab: Practice -->
    <section id="tab-practice" class="tab-content">
      <div class="practice-header" style="padding:12px;font-weight:600;font-size:15px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">
        <span>📝 练习历史</span>
        <button class="btn-text" data-action="clear-practice-history" style="font-size:13px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;">清空历史</button>
      </div>
      <div id="practice-history-list" style="padding:12px;"></div>
      <div class="empty-state" id="practice-empty">
        <div class="empty-icon">✏️</div>
        <p>还没有练习记录</p>
        <p class="hint">在知识地图中点击知识点详情页的「开始练习」</p>
      </div>
      <div id="practice-view" class="view" style="display:none"></div>
    </section>

    <!-- Tab: Me -->
    <section id="tab-me" class="tab-content">
      <div class="user-info" style="font-size:0.85em;color:#888;margin:8px 0;">
        用户 ID：<span id="display-user-id">--</span>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">99</div>
          <div class="stat-label">总知识点</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-mastered">0</div>
          <div class="stat-label">已掌握</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-fuzzy">0</div>
          <div class="stat-label">有模糊</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-rate">0%</div>
          <div class="stat-label">掌握率</div>
        </div>
      </div>
      <div class="export-info" id="export-info" style="font-size:0.85em;color:#888;margin:8px 0;display:none;">
        上次导出：<span id="last-export-time">--</span>
        <span id="export-reminder" style="color:#e74c3c;display:none;">（建议备份）</span>
      </div>
      <div class="action-list">
        <button class="action-btn" data-action="show-reset-options">🔄 重置数据</button>
        <button class="action-btn" data-action="export-data">📤 导出学习数据</button>
      </div>
      <div class="mastery-help" style="margin-top:16px;padding:12px;background:var(--bg-secondary);border-radius:8px;font-size:13px;">
        <div style="font-weight:600;margin-bottom:8px;">📝 掌握状态说明</div>
        <div style="margin-bottom:6px;"><span class="badge badge-mastered">已掌握</span> 已完成学习，能够熟练运用</div>
        <div style="margin-bottom:6px;"><span class="badge badge-fuzzy">有模糊</span> 学过但不够熟练，系统会推荐加强练习</div>
        <div style="margin-bottom:6px;"><span class="badge badge-unlearned">未学</span> 尚未开始学习</div>
        <div style="margin-top:8px;color:var(--text-secondary);font-size:12px;">💡 标记"有模糊"的知识点会在练习中优先推荐</div>
      </div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="tab-map">🗺️<span>知识地图</span></button>
    <button class="nav-btn" data-tab="tab-practice">✏️<span>练习</span></button>
    <button class="nav-btn" data-tab="tab-me">👤<span>我的</span></button>
  </nav>

  <!-- Grade/Chapter list view (template) -->
  <div id="list-view" class="view" style="display:none">
    <div class="list-header"></div>
    <ul class="tree-list"></ul>
  </div>

  <!-- Detail view (template) -->
  <div id="detail-view" class="view" style="display:none">
    <div class="detail-content"></div>
    <div class="detail-actions"></div>
  </div>

  <!-- Search overlay -->
  <div id="search-overlay" style="display:none">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索知识点...">
      <button id="btn-search-close" class="icon-btn">✕</button>
    </div>
    <ul id="search-results" class="search-list"></ul>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>
</div>

<script src="state-manager.js"></script>
<script src="app.js"></script>
</body>
</html>
