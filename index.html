<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumos 学习系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      width: 100%;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .header p {
      font-size: 18px;
      opacity: 0.9;
    }
    
    .modules {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    
    .module-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .module-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    
    .module-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    .module-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #2c3e50;
    }
    
    .module-desc {
      font-size: 16px;
      color: #7f8c8d;
      line-height: 1.6;
    }
    
    .module-status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 15px;
    }
    
    .status-ready {
      background: #d4edda;
      color: #155724;
    }
    
    .status-beta {
      background: #fff3cd;
      color: #856404;
    }
    
    .footer {
      text-align: center;
      color: white;
      margin-top: 40px;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🪄 Lumos</h1>
      <p>智能学习系统 - 让学习更高效</p>
    </div>
    
    <div class="modules">
      <a href="./math/" class="module-card">
        <div class="module-icon">📐</div>
        <div class="module-title">数学学习</div>
        <div class="module-desc">
          知识点学习 + 练习巩固<br>
          支持掌握状态标记、进度追踪、错题本
        </div>
        <span class="module-status status-ready">✅ 已就绪</span>
      </a>
      
      <a href="./english/" class="module-card">
        <div class="module-icon">📖</div>
        <div class="module-title">英语学习</div>
        <div class="module-desc">
          情景交际背诵 + 练习<br>
          记忆技巧提示、智能判分、错误追踪
        </div>
        <span class="module-status status-beta">🚀 MVP 测试中</span>
      </a>
    </div>
    
    <div class="footer">
      <p>Lumos Learning System © 2026</p>
    </div>
  </div>
</body>
</html>
